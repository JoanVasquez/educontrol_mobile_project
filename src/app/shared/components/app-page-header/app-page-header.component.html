<ion-header class="app-header" [class.app-header--start]="align() === 'start'" [class.app-header--red]="color() === 'red'">
  <ion-toolbar>
    @if (showBack()) {
      <ion-button class="app-header__back" fill="clear" slot="start" [routerLink]="backUrl()" aria-label="Volver">
        <ion-icon name="chevron-back" aria-hidden="true"></ion-icon>
      </ion-button>
    }

    <ion-title>
      <span class="app-header__title">{{ title() }}</span>
      @if (subtitle()) {
        <span class="app-header__subtitle">{{ subtitle() }}</span>
      }
    </ion-title>

    @if (actionLabel() || actionIcon()) {
      <ion-button class="app-header__action" fill="clear" slot="end" type="button" (click)="handleAction()" [attr.aria-label]="actionLabel() || 'Acción'">
        @if (actionIcon()) {
          <ion-icon [name]="actionIcon()" aria-hidden="true" />
        } @else {
          {{ actionLabel() }}
        }
      </ion-button>
    }
  </ion-toolbar>
</ion-header>
