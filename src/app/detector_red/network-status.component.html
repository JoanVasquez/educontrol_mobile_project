@if (status$ | async; as status) {
  @if (!status.connected) {
    <section class="network-status network-status--offline" aria-live="polite">
      <ion-icon name="cloud-offline-outline" aria-hidden="true" />
      <span>Modo offline activo. Puedes registrar estudiantes y se sincronizaran al volver la conexion.</span>
  </section>
  }
}
