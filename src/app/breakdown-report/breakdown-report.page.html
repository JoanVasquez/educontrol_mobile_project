<div class="report-shell">
  <app-page-header
    title="Reporte de averias"
    backUrl="/home"
    color="red"
    actionLabel="Estado"
    (actionClicked)="viewStatus()"
  />

  <ion-content class="report-content" [fullscreen]="false">
    <main class="report">
      <h1>Registrar avería</h1>

      <label class="field">
        <span>Categoría</span>
        <select [(ngModel)]="category" (ngModelChange)="clearMessages()">
          <option value="" disabled>Selecciona una categoría</option>
          @for (categoryOption of categories; track categoryOption) {
            <option [value]="categoryOption">{{ categoryOption }}</option>
          }
        </select>
      </label>

      <label class="field">
        <span>Descripción</span>
        <textarea [(ngModel)]="description" (ngModelChange)="clearMessages()" placeholder="Describa la avería..."></textarea>
      </label>

      <fieldset class="priority">
        <legend>Prioridad</legend>
        <div class="priority__options">
          <button type="button" class="priority__button priority__button--low" [class.is-selected]="priority() === 'low'" (click)="selectPriority('low')">Baja</button>
          <button type="button" class="priority__button priority__button--medium" [class.is-selected]="priority() === 'medium'" (click)="selectPriority('medium')">Media</button>
          <button type="button" class="priority__button priority__button--high" [class.is-selected]="priority() === 'high'" (click)="selectPriority('high')">Alta</button>
        </div>
      </fieldset>

      <label class="field">
        <span>Ubicación</span>
        <span class="field__location">
          <ion-icon name="location-outline" aria-hidden="true" />
          <input [(ngModel)]="location" (ngModelChange)="clearMessages()" placeholder="Ej: Baño 2do nivel..." />
        </span>
      </label>

      <fieldset class="photo-section">
        <legend>Evidencia (foto y video)</legend>
        <div class="photo-info">
          <ion-icon name="camera-outline" aria-hidden="true" />
          <strong>{{ photoName() || 'Ninguna foto seleccionada' }}</strong>
        </div>

        <div class="photo-buttons">
          <button
            type="button"
            class="photo-button photo-button--camera"
            (click)="takePhoto()"
            [disabled]="isLoading()"
            aria-label="Tomar foto con cámara"
          >
            <ion-icon name="camera-outline" aria-hidden="true" />
            Agregar foto
          </button>

          <button
            type="button"
            class="photo-button photo-button--gallery"
            (click)="pickPhotoFromGallery()"
            [disabled]="isLoading()"
            aria-label="Seleccionar foto de galería"
          >
            <ion-icon name="image-outline" aria-hidden="true" />
            Galería
          </button>
        </div>

        <label class="photo-button photo-button--file">
          <ion-icon name="cloud-upload-outline" aria-hidden="true" />
          Seleccionar archivo
          <input 
            type="file" 
            accept="image/*" 
            (change)="selectPhoto($event)" 
            [disabled]="isLoading()"
            aria-label="Seleccionar archivo de imagen"
          />
        </label>

        <div class="photo-info">
          <ion-icon name="videocam-outline" aria-hidden="true" />
          <strong>{{ videoName() || 'Ningun video seleccionado' }}</strong>
        </div>

        <div class="photo-buttons">
          <label class="photo-button photo-button--video">
            <ion-icon name="videocam-outline" aria-hidden="true" />
            Grabar video
            <input
              type="file"
              accept="video/*"
              capture="environment"
              (change)="selectVideo($event)"
              [disabled]="isLoading()"
              aria-label="Grabar video de la averia"
            />
          </label>

          <label class="photo-button photo-button--video">
            <ion-icon name="film-outline" aria-hidden="true" />
            Galeria
            <input
              type="file"
              accept="video/*"
              (change)="selectVideo($event)"
              [disabled]="isLoading()"
              aria-label="Seleccionar video de galeria"
            />
          </label>
        </div>
      </fieldset>

      @if (errorMessage()) {
        <div class="report__message report__message--error" aria-live="polite" role="alert">
          {{ errorMessage() }}
        </div>
      }

      @if (successMessage()) {
        <div class="report__message report__message--success" aria-live="polite" role="status">
          {{ successMessage() }}
        </div>
      }

      <button 
        class="report__submit" 
        type="button" 
        (click)="submit()"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <ion-spinner name="crescent"></ion-spinner>
          Enviando...
        } @else {
          Enviar reporte
        }
      </button>
    </main>
  </ion-content>

  <app-bottom-navigation activePath="/averias" color="red" />
</div>
